name: Diff-Report-PoC

env:
  DEFAULT_PROJECTS_LINK: "https://raw.githubusercontent.com/checkstyle/contribution/master/checkstyle-tester/projects-to-test-on-for-github-action.properties"

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.run_id }}
  cancel-in-progress: false

jobs:
  parse_body:
    if: github.event.comment.body == 'GitHub, generate report'
    runs-on: ubuntu-latest
    outputs:
      projects_link: ${{ steps.parse.outputs.projects_link }}
      config_link: ${{ steps.parse.outputs.config_link }}
      new_module_config_link: ${{ steps.parse.outputs.new_module_config_link }}
      patch_config_link: ${{ steps.parse.outputs.patch_config_link }}
      report_label: ${{ steps.parse.outputs.report_label }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      head_repo: ${{ steps.pr.outputs.head_repo }}
      base_ref: ${{ steps.pr.outputs.base_ref }}
      base_repo: ${{ steps.pr.outputs.base_repo }}
      commit_sha: ${{ steps.pr.outputs.commit_sha }}

    steps:
      - name: React to comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            })

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Getting PR description and PR info
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          PULL_REQUEST_URL: ${{ github.event.issue.pull_request.url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .ci-temp
          echo "$ISSUE_BODY" > .ci-temp/windows.txt
          tr -d '\15\32' < .ci-temp/windows.txt > .ci-temp/text

          curl --fail-with-body -X GET "${PULL_REQUEST_URL}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -o .ci-temp/info.json

          jq --raw-output .head.ref .ci-temp/info.json > .ci-temp/head_ref
          jq --raw-output .head.sha .ci-temp/info.json > .ci-temp/head_sha
          jq --raw-output .head.repo.full_name .ci-temp/info.json > .ci-temp/head_repo

          jq --raw-output .base.ref .ci-temp/info.json > .ci-temp/base_ref
          jq --raw-output .base.repo.full_name .ci-temp/info.json > .ci-temp/base_repo

      - name: Parse PR description
        id: parse
        run: |
          ./.ci/diff-report.sh parse-pr-description-text

      - name: Set PR outputs
        id: pr
        run: |
          ./.ci/append-to-github-output.sh "head_ref" "$(cat .ci-temp/head_ref)"
          ./.ci/append-to-github-output.sh "head_sha" "$(cat .ci-temp/head_sha)"
          ./.ci/append-to-github-output.sh "head_repo" "$(cat .ci-temp/head_repo)"
          ./.ci/append-to-github-output.sh "base_ref" "$(cat .ci-temp/base_ref)"
          ./.ci/append-to-github-output.sh "base_repo" "$(cat .ci-temp/base_repo)"
          ./.ci/append-to-github-output.sh "commit_sha" "$(cat .ci-temp/head_sha | cut -c 1-7)"

          echo "GITHUB_OUTPUT:"
          echo "$(cat "$GITHUB_OUTPUT")"

  make_report:
    runs-on: ubuntu-latest
    needs: parse_body
    if: needs.parse_body.outputs.config_link != '' || needs.parse_body.outputs.new_module_config_link != ''
    outputs:
      message: ${{ steps.out.outputs.message }}

    steps:
      - name: Download checkstyle
        uses: actions/checkout@v6

      - name: Download files
        env:
          NEW_MODULE_CONFIG_LINK: ${{ needs.parse_body.outputs.new_module_config_link }}
          DIFF_CONFIG_LINK: ${{ needs.parse_body.outputs.config_link }}
          PATCH_CONFIG_LINK: ${{ needs.parse_body.outputs.patch_config_link }}
          DIFF_PROJECTS_LINK: ${{ needs.parse_body.outputs.projects_link }}
          DEFAULT_PROJECTS_LINK: ${{ env.DEFAULT_PROJECTS_LINK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./.ci/diff-report.sh download-files

      - name: Set base and head remotes
        run: |
          BASE_REPO_GIT_URL="https://github.com/${{ needs.parse_body.outputs.base_repo }}.git"
          HEAD_REPO_GIT_URL="https://github.com/${{ needs.parse_body.outputs.head_repo }}.git"

          git remote add upstream "$BASE_REPO_GIT_URL"
          git fetch upstream

          git remote add forked "$HEAD_REPO_GIT_URL"
          git fetch forked

          git remote -v
          git branch -r | grep -E 'upstream|forked' || true

      - name: Setup local maven cache
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: checkstyle-maven-cache-${{ hashFiles('**/pom.xml') }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download contribution
        uses: actions/checkout@v6
        with:
          repository: checkstyle/contribution
          path: .ci-temp/contribution

      - name: Prepare environment
        run: |
          mv .ci-temp/projects.properties ./.ci-temp/contribution/checkstyle-tester/
          mv .ci-temp/*.xml ./.ci-temp/contribution/checkstyle-tester/

          curl --fail-with-body -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install groovy
          echo "$HOME/.sdkman/candidates/groovy/current/bin" >> "$GITHUB_PATH"

      - name: Generate report
        env:
          HEAD_REF: ${{ needs.parse_body.outputs.head_ref }}
          BASE_REF: ${{ needs.parse_body.outputs.base_ref }}
        run: |
          cd .ci-temp/contribution/checkstyle-tester
          REF="forked/$HEAD_REF"
          REPO="../../../../checkstyle"
          BASE_BRANCH="upstream/$BASE_REF"
          export MAVEN_OPTS="-Xmx5g"

          echo "pwd=$(pwd)"
          echo "Using REPO=$REPO"
          echo "Using REF=$REF"
          echo "Using BASE_BRANCH=$BASE_BRANCH"

          ls -la
          ls -la "$REPO"
          git -C "$REPO" remote -v
          git -C "$REPO" branch -a | grep -E 'upstream|forked' || true

          if [ -f new_module_config.xml ]; then
            echo "Generating report for new module"
            groovy diff.groovy -r "$REPO" -p "$REF" -pc new_module_config.xml -m single \
              -l projects.properties -xm "-Dcheckstyle.failsOnError=false" --allowExcludes
          elif [ -f patch_config.xml ]; then
            echo "Generating report with patch config"
            groovy diff.groovy -r "$REPO" -b "$BASE_BRANCH" -p "$REF" -bc diff_config.xml \
              -pc patch_config.xml -l projects.properties -xm "-Dcheckstyle.failsOnError=false" --allowExcludes
          else
            echo "Generating standard diff report"
            groovy diff.groovy -r "$REPO" -b "$BASE_BRANCH" -p "$REF" -c diff_config.xml \
              -l projects.properties -xm "-Dcheckstyle.failsOnError=false" --allowExcludes
          fi

      - name: Create minimal message
        run: |
          mkdir -p .ci-temp
          echo "PoC run finished for commit ${{ needs.parse_body.outputs.commit_sha }}" > .ci-temp/message

      - name: Set output
        id: out
        run: |
          ./.ci/append-to-github-output.sh "message" "$(cat .ci-temp/message)"

  send_message:
    runs-on: ubuntu-latest
    needs: [parse_body, make_report]
    if: failure() || success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get message
        env:
          MSG: ${{ needs.make_report.outputs.message }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .ci-temp
          if [ -z "$MSG" ]; then
            JOBS_LINK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            API_LINK="https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs"

            curl --fail-with-body -X GET "${API_LINK}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token $GITHUB_TOKEN" \
              -o .ci-temp/info.json

            jq '.jobs' .ci-temp/info.json > .ci-temp/jobs
            jq '.[] | select(.conclusion == "failure") | .name' .ci-temp/jobs > .ci-temp/job_name
            jq '.[] | select(.conclusion == "failure") | .steps' .ci-temp/jobs > .ci-temp/steps
            jq '.[] | select(.conclusion == "failure") | .name' .ci-temp/steps > .ci-temp/step_name

            echo "Report generation failed on phase $(cat .ci-temp/job_name)," > .ci-temp/message
            echo "step $(cat .ci-temp/step_name).<br>Link: $JOBS_LINK" >> .ci-temp/message
          else
            echo "$MSG" > .ci-temp/message
          fi

      - name: Set message
        id: out
        run: |
          ./.ci/append-to-github-output.sh "message" "$(cat .ci-temp/message)"

      - name: Comment PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.out.outputs.message }}`
            })
