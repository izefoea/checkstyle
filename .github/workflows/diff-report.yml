name: Diff-Report-PoC

#####################################################################################
# Minimal reproduction of the original cross-repo diff-report chain:
# - issue_comment trigger
# - checkout base repo
# - fetch PR branch from forked remote
# - download contribution repo
# - run trusted diff.groovy from contribution
# - diff.groovy internally checks out forked/$BRANCH and runs mvn clean install
#####################################################################################

env:
  USER_LOGIN: izefoea

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.run_id }}
  cancel-in-progress: false

jobs:
  parse_body:
    if: github.event.comment.body == 'GitHub, generate report'
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.ref }}
      commit_sha: ${{ steps.branch.outputs.commit_sha }}

    steps:
      - name: React to comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            })

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Getting PR info
        env:
          PULL_REQUEST_URL: ${{ github.event.issue.pull_request.url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .ci-temp

          curl --fail-with-body -X GET "${PULL_REQUEST_URL}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token $GITHUB_TOKEN" \
              -o .ci-temp/info.json

          jq --raw-output .head.ref .ci-temp/info.json > .ci-temp/branch
          jq --raw-output .head.sha .ci-temp/info.json > .ci-temp/commit_sha

      - name: Set branch
        id: branch
        run: |
          echo "ref=$(cat .ci-temp/branch)" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(cat .ci-temp/commit_sha | cut -c 1-7)" >> "$GITHUB_OUTPUT"

          echo "GITHUB_OUTPUT:"
          cat "$GITHUB_OUTPUT"

  make_report:
    runs-on: ubuntu-latest
    needs: parse_body
    if: needs.parse_body.outputs.branch != ''
    outputs:
      message: ${{ steps.out.outputs.message }}

    steps:
      - name: Download checkstyle
        uses: actions/checkout@v6

      # set main checkstyle repo as an upstream
      # Diff report will be generated taking upstream's master branch as a base branch
      - name: set upstream
        run: |
          MAIN_REPO_GIT_URL="https://github.com/checkstyle/checkstyle.git"
          git remote add upstream "$MAIN_REPO_GIT_URL"
          git fetch upstream

          FORK_REPO_GIT_URL="https://github.com/${USER_LOGIN}/checkstyle.git"
          git remote add forked "$FORK_REPO_GIT_URL"
          git fetch forked

      - name: Setup local maven cache
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: checkstyle-maven-cache-${{ hashFiles('**/pom.xml') }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download contribution
        uses: actions/checkout@v6
        with:
          repository: checkstyle/contribution
          path: .ci-temp/contribution

      - name: Prepare environment
        run: |
          mkdir -p .ci-temp/contribution/checkstyle-tester
          curl --fail-with-body -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install groovy
          echo "$HOME/.sdkman/candidates/groovy/current/bin" >> "$GITHUB_PATH"

      - name: Generate report
        env:
          BRANCH: ${{ needs.parse_body.outputs.branch }}
        run: |
          cd .ci-temp/contribution/checkstyle-tester
          REF="forked/$BRANCH"
          REPO="../../../../checkstyle"
          BASE_BRANCH="upstream/master"
          export MAVEN_OPTS="-Xmx5g"

          echo "Using REPO=$REPO"
          echo "Using REF=$REF"
          echo "Using BASE_BRANCH=$BASE_BRANCH"

          # Minimal invocation that preserves the original vulnerable semantic:
          # trusted diff.groovy will checkout forked/$BRANCH inside $REPO
          # and run mvn clean install there.
          groovy diff.groovy -r "$REPO" -p "$REF" \
            -c ../../../../sun_checks.xml \
            -l ../../../../.ci-temp/contribution/checkstyle-tester/projects-to-test-on.properties || true

      - name: Create minimal message
        run: |
          mkdir -p .ci-temp
          echo "PoC run finished for commit ${{ needs.parse_body.outputs.commit_sha }}" > .ci-temp/message

      - name: Set output
        id: out
        run: |
          echo "message=$(cat .ci-temp/message)" >> "$GITHUB_OUTPUT"

  send_message:
    runs-on: ubuntu-latest
    needs: [parse_body, make_report]
    if: failure() || success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get message
        env:
          MSG: ${{ needs.make_report.outputs.message }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .ci-temp
          if [ -z "$MSG" ]; then
            JOBS_LINK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "PoC failed. Link: $JOBS_LINK" > .ci-temp/message
          else
            echo "$MSG" > .ci-temp/message
          fi

      - name: Set message
        id: out
        run: |
          echo "message=$(cat .ci-temp/message)" >> "$GITHUB_OUTPUT"

      - name: Comment PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.out.outputs.message }}`
            })
